version: '3'

services:
  myDB:
    image: mysql:8.0
    container_name: my-database
    restart: always
    ports:
      - 3306:3306
    environment:
      - MYSQL_USER=alumno
      - MYSQL_PASSWORD=123456
      - MYSQL_DATABASE=course-db
      - MYSQL_ROOT_PASSWORD=root123456
    volumes:
      - ./mysql:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    restart: always
    depends_on:
      - myDB
    ports:
      - 8080:80
    environment:
      - PMA_HOST=myDB
      - PMA_PORT=3306
      - MYSQL_ROOT_PASSWORD=root123456